<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Produtos - LUMIGALVA</title>

    <!-- Fonte -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron&display=swap" rel="stylesheet">

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            font-family:'Orbitron', sans-serif;
            background:#111;
            color:#fff;
        }

        /* HEADER */
        header{
            display:flex;
            justify-content:space-between;
            align-items:center;
            padding:20px 40px;
            background:rgba(10,10,10,0.7);
            border-bottom:2px solid #e6c109;
            flex-wrap:wrap;
        }

        .logo{
            display:flex;
            align-items:center;
            gap:10px;
        }

        .text{
            font-size:24px;
            text-shadow:0 0 10px #e6c109;
            animation: glow 1.5s infinite alternate;
        }

        .box{
            width:25px;
            height:25px;
            background:#e6c109;
            border-radius:5px;
            animation: moveBox 1s infinite alternate;
        }

        @keyframes moveBox{
            from{transform:translateX(0);}
            to{transform:translateX(30px);}
        }

        @keyframes glow{
            from{text-shadow:0 0 10px #e6c109;}
            to{text-shadow:0 0 25px #ffd700;}
        }

        nav a{
            color:#fff;
            margin-left:20px;
            text-decoration:none;
            transition:0.3s;
        }

        nav a:hover{
            color:#e6c109;
        }

        /* HERO */
        .hero{
            padding:80px 40px;
            background:rgba(0,0,0,0.6);
            margin:20px;
            border-radius:10px;
        }

        .hero h1{
            font-size:42px;
        }

        .hero p{
            color:#ccc;
            margin:20px 0;
        }


        /* BOTÃO */
        .btn{
            padding:12px 25px;
            background:#e6c109;
            color:#000;
            border:none;
            cursor:pointer;
            border-radius:5px;
            transition:0.3s;
        }

        .btn:hover{
            box-shadow:0 0 20px #e6c109;
            transform:scale(1.05);
        }


        h1{
            text-shadow:0 0 10px #e6c109;
        }

        .container{
            padding:40px;
        }

        .grid{
            display:grid;
            grid-template-columns:repeat(auto-fit, minmax(250px, 1fr));
            gap:20px;
        }

        .card{
            background:#1a1a1a;
            border-radius:10px;
            overflow:hidden;
            transition:0.3s;
        }

        .card:hover{
            transform:scale(1.05);
            box-shadow:0 0 20px #e6c109;
        }

        .card img{
            width:100%;
            height:200px;
            object-fit:cover;
        }

        .card-content{
            padding:15px;
        }

        .card h3{
            margin-bottom:10px;
        }

        .card p{
            color:#ccc;
            font-size:14px;
        }

        .btn{
            display:inline-block;
            margin-top:10px;
            padding:10px 15px;
            background:#e6c109;
            color:#000;
            text-decoration:none;
            border-radius:5px;
        }

        .btn:hover{
            box-shadow:0 0 10px #e6c109;
        }

        .back{
            margin:20px;
            display:inline-block;
            color:#e6c109;
            text-decoration:none;
        }
    </style>
</head>

<body>

<header>
    <div class="logo">
        <div class="text">LUMIGALVA -<= </div>
        <div class="box"></div>
    </div>

    <nav>
        <a href="#">Nossos produtos</a>
       
    </nav>
</header>

<div id="modal" style="
    display:none;
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.9);
    justify-content:center;
    align-items:center;
">
    <img id="modal-img" style="max-width:90%; max-height:90%;">
</div>

<div class="container">

    <a href="animt7.html" class="back">⬅ Voltar</a>

    <div class="grid">

        <!-- PRODUTO 1 -->
        <div class="card">
            <img src="produto1.jpg">
            <div class="card-content">
                <h3>Luminária Industrial Rústica</h3>
                <p>Feita com tubos galvanizados e lâmpada retrô.</p>
                <a href="#" class="btn">Comprar</a>
            </div>
        </div>

        <!-- PRODUTO 2 -->
        <div class="card">
            <img src="produto2.jpg">
            <div class="card-content">
                <h3>Luminária de Mesa</h3>
                <p>Design industrial com acabamento artesanal.</p>
                <a href="#" class="btn">Comprar</a>
            </div>
        </div>

        <!-- PRODUTO 3 -->
        <div class="card">
            <img src="produto4.jpg">
            <div class="card-content">
                <h3>Luminária Tubular</h3>
                <p>Ideal para ambientes industriais e decorativos.</p>
                <a href="#" class="btn">Comprar</a>
            </div>
        </div>

    </div>

</div>

<script>
    const images = document.querySelectorAll('.card img');
    const modal = document.getElementById('modal');
    const modalImg = document.getElementById('modal-img');

    images.forEach(img => {
        img.addEventListener('click', () => {
            modal.style.display = 'flex';
            modalImg.src = img.src;
        });
    });

    modal.addEventListener('click', () => {
        modal.style.display = 'none';
    });
</script>

</body>
</html>
