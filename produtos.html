<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Produtos - LUMIGALVA</title>

<!-- Fonte -->
<link href="https://fonts.googleapis.com/css2?family=Orbitron&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Orbitron', sans-serif;
    background:#111;
    color:#fff;
}

/* HEADER */
header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:20px 40px;
    background:rgba(10,10,10,0.7);
    border-bottom:2px solid #e6c109;
    flex-wrap:wrap;
}

.logo{
    display:flex;
    align-items:center;
    gap:10px;
}

.text{
    font-size:24px;
    text-shadow:0 0 10px #e6c109;
    animation: glow 1.5s infinite alternate;
}

.box{
    width:25px;
    height:25px;
    background:#e6c109;
    border-radius:5px;
    animation: moveBox 1s infinite alternate;
}

@keyframes moveBox{
    from{transform:translateX(0);}
    to{transform:translateX(30px);}
}

@keyframes glow{
    from{text-shadow:0 0 10px #e6c109;}
    to{text-shadow:0 0 25px #ffd700;}
}

nav a{
    color:#fff;
    margin-left:20px;
    text-decoration:none;
    transition:0.3s;
}

nav a:hover{
    color:#e6c109;
}

/* CONTAINER */
.container{
    padding:20px;
    max-width:1200px;
    margin:auto;
}

/* VOLTAR */
.back{
    display:inline-block;
    margin-bottom:20px;
    color:#e6c109;
    text-decoration:none;
}

/* GRID DE PRODUTOS */
.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit, minmax(200px, 1fr));
    gap:20px;
}

/* CARD */
.card{
    background:#1a1a1a;
    border-radius:10px;
    overflow:hidden;
    transition:0.3s;
}

.card:hover{
    transform:scale(1.05);
    box-shadow:0 0 20px #e6c109;
}

.card img{
    width:100%;
    height:200px;
    object-fit:cover;
    cursor:pointer;
}

.card-content{
    padding:15px;
}

.card h3{
    margin-bottom:10px;
    font-size:18px;
}

.card p{
    color:#ccc;
    font-size:14px;
}

.btn{
    display:inline-block;
    margin-top:10px;
    padding:10px 15px;
    background:#e6c109;
    color:#000;
    text-decoration:none;
    border-radius:5px;
    transition:0.3s;
}

.btn:hover{
    box-shadow:0 0 10px #e6c109;
}

/* MODAL DE IMAGEM */
#modal{
    display:none;
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.9);
    justify-content:center;
    align-items:center;
    z-index:1000;
}

#modal img{
    max-width:90%;
    max-height:90%;
    border-radius:10px;
}

/* RESPONSIVO */
@media(max-width:768px){
    header{
        flex-direction:column;
        align-items:flex-start;
    }

    nav{
        margin-top:10px;
    }

    .grid{
        grid-template-columns:1fr;
    }

    .card img{
        height:250px;
    }
}

@media(max-width:480px){
    .card img{
        height:200px;
    }

    .card h3{
        font-size:16px;
    }

    .card p{
        font-size:13px;
    }

    .btn{
        padding:8px 12px;
        font-size:14px;
    }
}
</style>
</head>

<body>

<header>
    <div class="logo">
        <div class="text">LUMIGALVA -<= </div>
        <div class="box"></div>
    </div>

    <nav>
        <a href="#">Nossos produtos</a>
    </nav>
</header>

<!-- MODAL -->
<div id="modal">
    <img id="modal-img">
</div>

<div class="container">

    <a href="animt7.html" class="back">⬅ Voltar</a>

    <div class="grid">

        <!-- PRODUTO 1 -->
        <div class="card">
            <img src="produto1.jpg" alt="Luminária Industrial Rústica">
            <div class="card-content">
                <h3>Luminária Industrial Rústica</h3>
                <p>Feita com tubos galvanizados e lâmpada retrô.</p>
                <a href="#" class="btn">Comprar</a>
            </div>
        </div>

        <!-- PRODUTO 2 -->
        <div class="card">
            <img src="produto2.jpg" alt="Luminária de Mesa">
            <div class="card-content">
                <h3>Luminária de Mesa</h3>
                <p>Design industrial com acabamento artesanal.</p>
                <a href="#" class="btn">Comprar</a>
            </div>
        </div>

        <!-- PRODUTO 3 -->
        <div class="card">
            <img src="produto4.jpg" alt="Luminária Tubular">
            <div class="card-content">
                <h3>Luminária Tubular</h3>
                <p>Ideal para ambientes industriais e decorativos.</p>
                <a href="#" class="btn">Comprar</a>
            </div>
        </div>

    </div>

</div>

<script>
const images = document.querySelectorAll('.card img');
const modal = document.getElementById('modal');
const modalImg = document.getElementById('modal-img');

images.forEach(img => {
    img.addEventListener('click', () => {
        modal.style.display = 'flex';
        modalImg.src = img.src;
    });
});

modal.addEventListener('click', () => {
    modal.style.display = 'none';
});
</script>

</body>
</html>
