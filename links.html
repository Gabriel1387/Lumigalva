<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Orbitron', sans-serif;
    background:url('logo2.jpg') no-repeat center center fixed;
    background-size: cover;
    color:#fff;

    display:flex;

    left:0;

    height:100%;
    background:rgba(0,0,0,0.6);

}

a{
    display:block;
    width:100%;
    margin:12px 0;
    padding:15px;
    background:#1a1a1a;
    color:#fff;
    text-decoration:none;
    border-radius:10px;
    transition:0.3s;
    font-size:16px;
}

a:hover{
    background:#e6c109;
    color:#000;
    transform:scale(1.05);
}

/* RESPONSIVO EXTRA */
@media(max-width:480px){
    h1{
        font-size:22px;
    }
